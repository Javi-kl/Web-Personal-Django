<ul class="main-menu">
    <li><a href="{% url 'core:home' %}">INICIO</a></li>
    <li><a href="{% url 'core:about_me' %}">SOBRE MÍ</a></li>
    {% if request.user.is_authenticated %}
        <li>
            <form method="post" action="{% url 'core:logout' %}">
                {% csrf_token %}
                <button type="submit">CERRAR SESIÓN</button>
            </form>
        </li>
    {% else %}
        <li><button><a href="{% url 'core:login' %}">LOGIN</a></button></li>
    {% endif %}
</ul>


<section class="messages">
    {% if messages %}
        {% for message in messages %}
            <div class="message {{ message.tags }}">{{ message }}</div>
        {% endfor %}
    {% endif %}
</section>
