<div class="projects-grid">
    {% for project in projects %}
        <a class="project-card-link" href="{% url 'projects:project_detail' project.pk %}"
           aria-label="Ver detalles de {{ project.title }}">
            <article class="project-card" id="project-{{ project.pk }}">
                {% if project.images.first %}
                    <img src="{{ project.images.first.image.url }}"
                         alt="Imagen de {{ project.title }}"
                         loading="lazy">
                {% endif %}
                <div class="project-card-content">
                    <h3>{{ project.title }}</h3>
                    <p class="project-card-meta">Publicado: {{ project.created_at|date:"d/m/Y" }}</p>
                </div>
            </article>
        </a>
    {% empty %}
        <p class="empty-state">Todavía no hay proyectos publicados.</p>
    {% endfor %}
</div>
