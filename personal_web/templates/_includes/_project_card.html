<div class="projects-grid">
    {% for project in projects %}
        <article class="project-card" id="{{project.pk}}">
            {% if project.images.first %}
                <img src="{{ project.images.first.image.url }}" 
                     alt="Imagen de {{ project.title }}"
                     loading="lazy">
            {% endif %}
            <div class="project-card-content">
                <h2>{{project.title}}</h2>
                <p class="project-card-meta">Publicado: {{ project.created_at|date:"d/m/Y" }}</p>
                {% if project.github_url %}
                    <p><a href="{{project.github_url}}" target="_blank">Ver en GitHub</a></p>
                {% endif %}
                <p><a href="{% url 'projects:project_detail' project.pk%}">Ver proyecto</a></p>
            </div>
        </article>
    {% endfor %}
</div>
