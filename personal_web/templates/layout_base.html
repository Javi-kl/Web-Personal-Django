<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block head_title %}Título base{% endblock %}</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap');
    </style>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/matrix_theme.css' %}">
</head>
<body>
    <div class="site-wrapper">
        {% include '_includes/_header.html' %}
        {% if messages %}
            <section class="messages" aria-label="Notificaciones">
                {% for message in messages %}
                    <div class="message {{ message.tags }}">{{ message }}</div>
                {% endfor %}
            </section>
        {% endif %}
        <main class="page-content">
            {% block page_content %}
            {% endblock %}
        </main>
        {% include '_includes/_footer.html' %}
    </div>
</body>
</html>
