name: CI

on: 
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
# ===========================================================================
    # SERVICIO DE BASE DE DATOS
    # ===========================================================================
    # GitHub Actions lanza PostgreSQL como contenedor paralelo.
    # Es efímero: se destruye cuando el workflow termina.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      # =========================================================================
      # 1. DESCARGAR CÓDIGO
      # =========================================================================
      - name: Checkout code
        uses: actions/checkout@v4

      # =========================================================================
      # 2. INSTALAR PYTHON
      # =========================================================================
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip  

      # =========================================================================
      # 3. INSTALAR DEPENDENCIAS
      # =========================================================================
      - name: Install dependencies
        run: pip install -r requirements.txt

      # =========================================================================
      # 4. VALIDACIONES PREVIAS 
      # =========================================================================
      - name: Django system check
        run: python manage.py check
      # Verifica que no hay migraciones sin crear 
      - name: Check for uncreated migrations
        run: python manage.py makemigrations --check --dry-run

      # =========================================================================
      # 5. EJECUTAR MIGRACIONES
      # =========================================================================
      # Django crea una BD temporal para tests, esto verifica que las
      # migracionesfuncionen correctamente (integration test)
      - name: Run migrations
        run: python manage.py migrate --noinput
        env:
          SECRET_KEY: ci-test-secret-key-do-not-use-in-prod-abc1234567890
          DEBUG: "True"
          ALLOWED_HOSTS: "localhost,127.0.0.1"
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5432"

      # =========================================================================
      # 6. EJECUTAR TESTS
      # =========================================================================
      - name: Run tests
        run: python manage.py test -v 2
        env:
          SECRET_KEY: ci-test-secret-key-do-not-use-in-prod-abc1234567890
          DEBUG: "True"
          ALLOWED_HOSTS: "localhost,127.0.0.1"
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5432"
