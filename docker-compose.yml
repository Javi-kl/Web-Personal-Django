
services:
  # ===========================================================================
  # POSTGRESQL
  # ===========================================================================
  db:
    image: postgres:16-alpine
    container_name: portfolio-postgres
    # Variables de entorno (leen de .env automáticamente)
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    
    # Volumen persistente para datos
    volumes:
      - postgres_data:/var/lib/postgresql/data
    
    # Healthcheck: verifica que PostgreSQL esté listo
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

    restart: unless-stopped
  # ===========================================================================
  # APLICACIÓN DJANGO
  # ===========================================================================
  web:
    userns_mode: "keep-id"
    build: .
    container_name: portfolio-web


    # Comando a ejecutar (sobrescribe CMD del Dockerfile)
    command: gunicorn personal_web.wsgi:application 
      --bind 0.0.0.0:8000 
      --workers 3 
      --timeout 30 
      --graceful-timeout 10 
      --max-requests 1000 
      --max-requests-jitter 50 
      --log-level warning 
      --error-logfile -
    
    # Volúmenes: código (desarrollo) y estáticos
    volumes:
      - .:/app:Z
      - static_volume:/app/staticfiles  
      - media_volume:/app/media
    # Puertos: host:contenedor
    ports:
      - "127.0.0.1:8000:8000"
    
    # Dependencias: web espera hasta que db esté "healthy"
    depends_on:
      db:
        condition: service_healthy
    
    # Variables de entorno desde .env
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - DEBUG=${DEBUG}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_HOST=db    # Nombre del servicio, no localhost
      - POSTGRES_PORT=5432

    restart: unless-stopped

# ===========================================================================
# NGINX
# ===========================================================================
  nginx:
    image: nginx:alpine
    container_name: portfolio-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:Z
      - static_volume:/app/staticfiles:Z
      - media_volume:/app/media:Z
      - /etc/letsencrypt:/etc/letsencrypt:ro,z
    depends_on:
      - web
    restart: unless-stopped
# =============================================================================
# VOLÚMENES PERSISTENTES
# =============================================================================
# Los datos sobreviven a reinicios del contenedor
volumes:
  postgres_data:
  static_volume:
  media_volume:
