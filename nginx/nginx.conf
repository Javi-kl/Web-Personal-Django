events {
    worker_connections 1024;
}
http {
    include /etc/nginx/mime.types; 

    upstream django {
        server web:8000;
    }
# 1. Redirigir todo el tráfico HTTP a HTTPS
    server {
        listen 80;
        server_name javikl.dev www.javikl.dev;
        return 301 https://$host$request_uri;
    }
# 2. Servidor HTTPS principal
     server {
        listen 443 ssl;
        server_name javikl.dev www.javikl.dev;

        # Rutas a los certificados que acabamos de generar
        ssl_certificate /etc/letsencrypt/live/javikl.dev/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/javikl.dev/privkey.pem;

        # Opciones de seguridad recomendadas
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        location /static/ {
            alias /app/staticfiles/;
            expires 1y;                          # ← caché para estáticos
            add_header Cache-Control "public";
        }
        location /media/ {
            alias /app/media/;
        }
        location / {
            proxy_pass http://django;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;  # ← añade esto
            proxy_set_header X-Forwarded-Proto $scheme;                    # ← y esto
        }
    }
}
